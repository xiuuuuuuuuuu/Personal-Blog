# Pages placed under these sections will be shown on homepage and archive page.
mainSections = ["post"]
# Output page's full content in RSS.
rssFullContent = true
favicon        = "img/favicon.png"

# Accepted values: "default", "lastmod"
# default = see https://gohugo.io/quick-reference/glossary/#default-sort-order
# lastmod = sort by last modified date, in descending order
SortBy              = "default"

[footer]
    since      = 2026
    customText = ""

[dateFormat]
    published   = ":date_full"
    lastUpdated = ":date_full"

[sidebar]
    emoji    = "🍥"
    subtitle = "写点有意思的东西"
    avatar   = "img/avatar.png"

[skillTree]
    title       = "技能树"
    defaultOpen = false
    [[skillTree.items]]
        name = "C#"
        slug = "csharp"
    [[skillTree.items]]
        name = "C++"
        slug = "cpp"
    [[skillTree.items]]
        name = "Unity"
        slug = "unity"
    [[skillTree.items]]
        name = "UE"
        slug = "ue"
    [[skillTree.items]]
        name = "OpenGL"
        slug = "opengl"
    [[skillTree.items]]
        name = "Math"
        slug = "math"
    [[skillTree.items]]
        name = "DSA"
        slug = "dsa"
    [[skillTree.items]]
        name = "Tools"
        slug = "tools"
    [[skillTree.items]]
        name = "数据持久化"
        slug = "data-persistence"

[article]
    headingAnchor = false
    math          = false
    readingTime   = true

    [article.license]
        enabled = true
        default = "Licensed under CC BY-NC-SA 4.0"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[opengraph.twitter]
    site = ""
    card = "summary_large_image"

[colorScheme]
    toggle  = true
    default = "auto"

## Comments
[comments]
    enabled  = false
    provider = "disqus"

    # See all the available configurations at https://github.com/CaiJimmy/hugo-theme-stack/blob/master/config/_default/params.toml
    # Copy the configurations you need from there and paste it here.
