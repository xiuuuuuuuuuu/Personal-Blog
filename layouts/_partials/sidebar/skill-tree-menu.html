{{- with .Site.Params.skillTree -}}
    {{- if .items -}}
    <li class="menu-item-collapsible skill-tree-menu">
        <details class="skill-tree-details" {{ if default true .defaultOpen }}open{{ end }}>
            <script>
                (function() {
                    var details = document.currentScript.closest('.skill-tree-details');
                    if (!details) return;
                    var key = 'skillTreeOpen';
                    var saved = localStorage.getItem(key);
                    if (saved === 'true') { details.setAttribute('open', ''); }
                    else if (saved === 'false') { details.removeAttribute('open'); }
                    details.addEventListener('toggle', function() {
                        localStorage.setItem(key, details.open);
                    });
                })();
            </script>
            <summary class="skill-tree-summary">
                {{ partial "helper/icon" "hash" }}
                <span class="skill-tree-label">{{ default "技能树" .title }}</span>
                <span class="skill-tree-chevron">{{ partial "helper/icon" "chevron-right" }}</span>
            </summary>
            <ol class="skill-tree-submenu">
                {{- range .items -}}
                <li class="skill-tree-subitem skill-tree-subitem-link">
                    <a href="{{ "tags/" | relLangURL }}{{ .slug }}/">
                        {{- .name -}}
                    </a>
                </li>
                {{- end -}}
            </ol>
        </details>
    </li>
    {{- end -}}
{{- end -}}
