<section class="widget schulte-table schulte-table--idle" id="schulte-table">
    <div class="schulte-table__toolbar">
        <div class="schulte-table__status">
            <span class="schulte-table__timer" aria-live="polite">--</span>
            <span class="schulte-table__progress" hidden>下一个: 1</span>
        </div>
        <button type="button" class="schulte-table__reset" title="重新开始" hidden>↻</button>
    </div>
    <div class="schulte-table__stage">
        <button type="button" class="schulte-table__start">开始游戏</button>
        <div class="schulte-table__grid" role="grid" aria-label="舒尔特方块" hidden></div>
    </div>
    <p class="schulte-table__hint">按 1 → 25 顺序点击</p>
</section>
