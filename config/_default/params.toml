# Pages placed under these sections will be shown on homepage and archive page.
mainSections = ["post"]
# Output page's full content in RSS.
rssFullContent = true
favicon        = "img/favicon.png"

# Accepted values: "default", "lastmod"
# default = see https://gohugo.io/quick-reference/glossary/#default-sort-order
# lastmod = sort by last modified date, in descending order
SortBy              = "default"

[footer]
    since      = 2026
    customText = ""

[dateFormat]
    published   = ":date_full"
    lastUpdated = ":date_full"

[sidebar]
    emoji    = "🍥"
    subtitle = "写点有意思的东西"
    avatar   = "img/avatar.png"

[skillTree]
    title       = "技能树"
    defaultOpen = false

    [[skillTree.categories]]
        name = "编程语言"
        items = [
            { name = "C#",  slug = "csharp" },
            { name = "Lua", slug = "lua" },
        ]

    [[skillTree.categories]]
        name = "数据处理"
        items = [
            { name = "PlayerPrefs",      slug = "playerprefs" },
            { name = "Json",             slug = "json" },
            { name = "二进制",           slug = "binary" },
            { name = "ScriptableObject", slug = "scriptableobject" },
        ]

    [[skillTree.categories]]
        name = "游戏引擎"
        items = [
            { name = "Unity",       slug = "unity" },
            { name = "Cinemachine", slug = "cinemachine" },
            { name = "DoTween",     slug = "dotween" },
        ]

    [[skillTree.categories]]
        name = "游戏框架"
        items = [
            { name = "UI 管理", slug = "ui-manager" },
            { name = "资源加载", slug = "resource-loading" },
            { name = "对象池",   slug = "object-pool" },
            { name = "事件中心", slug = "event-center" },
            { name = "音频管理", slug = "audio-manager" },
        ]

    [[skillTree.categories]]
        name = "界面设计"
        items = [
            { name = "GUI",  slug = "gui" },
            { name = "UGUI", slug = "ugui" },
        ]

    [[skillTree.categories]]
        name = "热更新"
        items = [
            { name = "AssetBundle",  slug = "assetbundle" },
            { name = "Addressables", slug = "addressables" },
            { name = "xLua",         slug = "xlua" },
        ]

    [[skillTree.categories]]
        name = "网络开发"

[article]
    headingAnchor = false
    math          = false
    readingTime   = true

    [article.license]
        enabled = true
        default = "Licensed under CC BY-NC-SA 4.0"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 3 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
        { type = "schulte-table" },
    ]
    page = [{ type = "toc" }]

[opengraph.twitter]
    site = ""
    card = "summary_large_image"

[colorScheme]
    toggle  = true
    default = "auto"

## Comments
[comments]
    enabled  = false
    provider = "disqus"

    # See all the available configurations at https://github.com/CaiJimmy/hugo-theme-stack/blob/master/config/_default/params.toml
    # Copy the configurations you need from there and paste it here.
